<script>
    const tele = window.Telegram?.WebApp;
    const teleUser = tele?.initDataUnsafe?.user;
    let userData = [];

    // ── Sample data matching MongoDB document structure ──────────────────
    // Sorted by created_at descending (newest first), max 100
    const sampleData = {
        users: [
            { user_id: "123456789", role: "admin",       contribution: 312, added_by: "system",    created_at: "2026-04-25T10:30:00Z", updated_at: "2026-04-25T10:30:00Z" },
            { user_id: "987654321", role: "contributor", contribution: 287, added_by: "admin1",    created_at: "2026-04-25T09:15:00Z", updated_at: "2026-04-25T09:15:00Z" },
            { user_id: "456123789", role: "contributor", contribution: 254, added_by: "admin2",    created_at: "2026-04-24T22:45:00Z", updated_at: "2026-04-24T22:45:00Z" },
            { user_id: "321987654", role: "member",      contribution: 198, added_by: "admin1",    created_at: "2026-04-24T18:20:00Z", updated_at: "2026-04-24T18:20:00Z" },
            { user_id: "741852963", role: "contributor", contribution: 175, added_by: "system",    created_at: "2026-04-24T14:00:00Z", updated_at: "2026-04-24T14:00:00Z" },
            { user_id: "852963741", role: "member",      contribution: 143, added_by: "admin3",    created_at: "2026-04-23T20:10:00Z", updated_at: "2026-04-23T20:10:00Z" },
            { user_id: "963741852", role: "member",      contribution: 121, added_by: "admin2",    created_at: "2026-04-23T11:55:00Z", updated_at: "2026-04-23T11:55:00Z" },
            { user_id: "159357486", role: "contributor", contribution:  98, added_by: "admin1",    created_at: "2026-04-22T08:30:00Z", updated_at: "2026-04-22T08:30:00Z" },
            { user_id: "264817395", role: "member",      contribution:  76, added_by: "system",    created_at: "2026-04-21T17:40:00Z", updated_at: "2026-04-21T17:40:00Z" },
            { user_id: "375926184", role: "member",      contribution:  54, added_by: "admin3",    created_at: "2026-04-20T12:00:00Z", updated_at: "2026-04-20T12:00:00Z" },
        ]
    };

    function goToDestination(url) {
        window.location.href = url;
    }

    function showLoading() {
        document.getElementById('loadingOverlay').classList.remove('hidden');
    }

    function hideLoading() {
        setTimeout(() => {
            document.getElementById('loadingOverlay').classList.add('hidden');
        }, 500);
    }

    function getMedal(rank) {
        if (rank === 1) return '<i class="fas fa-medal" style="color:#ffd700;"></i>';
        if (rank === 2) return '<i class="fas fa-medal" style="color:#c0c0c0;"></i>';
        if (rank === 3) return '<i class="fas fa-medal" style="color:#cd7f32;"></i>';
        return rank + '.';
    }

    function formatDate(dateStr) {
        try {
            return new Date(dateStr).toLocaleString('id-ID', {
                day: '2-digit', month: 'short', year: 'numeric',
                hour: '2-digit', minute: '2-digit'
            });
        } catch { return dateStr; }
    }

    function renderLeaderboard(data) {
        const container = document.getElementById('leaderboard');
        const countEl = document.getElementById('totalCount');

        // Sort newest first, cap at 100
        const sorted = [...data]
            .sort((a, b) => new Date(b.created_at) - new Date(a.created_at))
            .slice(0, 100);

        countEl.textContent = sorted.length + ' user' + (sorted.length !== 1 ? 's' : '');

        if (sorted.length === 0) {
            container.innerHTML = `
                <div class="empty-state">
                    <i class="fas fa-users"></i>
                    <p>No data yet</p>
                </div>`;
            return;
        }

        container.innerHTML = sorted.map((user, index) => {
            const rank = index + 1;
            return `
            <div class="leaderboard-item ${rank <= 3 ? 'top3' : ''}">
                <div class="user-info">
                    <div class="user-name">
                        <i class="fa fa-user"></i>${user.user_id}
                    </div>
                    <div class="user-meta">
                        <span><i class="fas fa-tag"></i>${user.role}</span>
                        <span><i class="fas fa-user-plus"></i>${user.added_by}</span>
                    </div>
                </div>
                <div class="stats">
                    <div class="timestamp">
                        <i class="fas fa-clock"></i> ${formatDate(user.created_at)}
                    </div>
                </div>
            </div>`;
        }).join('');
    }

    async function searchUser() {
        const searchInput = document.getElementById('searchInput');
        const searchResult = document.getElementById('searchResult');
        const userId = searchInput.value.trim() || teleUser?.id;

        if (!userId) {
            searchResult.className = 'search-result show error';
            searchResult.innerHTML = `
                <div class="search-result-message">
                    <i class="fas fa-exclamation-circle search-result-icon"></i>
                    <span>Enter your Telegram user ID!</span>
                </div>`;
            return;
        }

        searchResult.className = 'search-result show';
        searchResult.innerHTML = `
            <div class="search-result-message">
                <i class="fas fa-spinner fa-spin search-result-icon"></i>
                <span>Searching...</span>
            </div>`;

        try {
            const response = await fetch(`/api?id=${encodeURIComponent(userId)}`, {
                method: 'GET',
                headers: { 'Content-Type': 'application/json' }
            });

            if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);

            const data = await response.json();

            if (data && data.users && data.users.length > 0) {
                const user = data.users[0];
                // Find rank in current sorted leaderboard
                const sorted = [...userData]
                    .sort((a, b) => new Date(b.created_at) - new Date(a.created_at))
                    .slice(0, 100);
                const rankIndex = sorted.findIndex(u => u.user_id == userId);
                const rank = rankIndex >= 0 ? rankIndex + 1 : '?';

                searchResult.className = 'search-result show success';
                searchResult.innerHTML = `
                    <div class="search-result-content">
                        <div class="search-result-info">
                            <div class="search-result-name">
                                <i class="fas fa-user"></i>${user.user_id}
                            </div>
                            <div class="search-result-meta">
                                <span><i class="fas fa-tag"></i> Role: ${user.role}</span>
                                <span><i class="fas fa-user-plus"></i> Added by: ${user.added_by}</span>
                            </div>
                        </div>
                        <div class="search-result-stats">
                            <div class="search-result-time">
                                <i class="fas fa-clock"></i> ${formatDate(user.created_at)}
                            </div>
                        </div>
                    </div>`;
            } else {
                searchResult.className = 'search-result show error';
                searchResult.innerHTML = `
                    <div class="search-result-message">
                        <i class="fas fa-times-circle search-result-icon"></i>
                        <span>User ID tidak ditemukan dalam Top 100</span>
                    </div>`;
            }
        } catch (error) {
            console.error('Error searching user:', error);
            searchResult.className = 'search-result show error';
            searchResult.innerHTML = `
                <div class="search-result-message">
                    <i class="fas fa-exclamation-triangle search-result-icon"></i>
                    <span>Something went wrong! Please try again later.</span>
                </div>`;
        }
    }

    async function fetchDataFromAPI() {
        try {
            const response = await fetch('/api', {
                method: 'GET',
                headers: { 'Content-Type': 'application/json' }
            });

            if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);

            const data = await response.json();

            if (data && data.users) {
                userData = data.users;
                renderLeaderboard(userData);
                hideLoading();
            } else {
                throw new Error('Format data tidak valid');
            }
        } catch (error) {
            console.error('Error fetching data:', error);
            // Fallback to sample data
            userData = sampleData.users;
            renderLeaderboard(userData);
            hideLoading();
        }
    }

    function startAutoRefresh(interval = 30000) {
        setInterval(() => fetchDataFromAPI(), interval);
    }

    document.addEventListener('DOMContentLoaded', () => {
        // Enter key triggers search
        document.getElementById('searchInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') searchUser();
        });

        showLoading();
        fetchDataFromAPI();
        startAutoRefresh(30000);
    });

    // Accept injected data via postMessage
    window.addEventListener('message', (event) => {
        if (event.data && event.data.users) {
            userData = event.data.users;
            renderLeaderboard(userData);
        }
    });
</script>
